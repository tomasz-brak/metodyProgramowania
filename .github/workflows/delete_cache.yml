name: Clear All GitHub Actions Caches

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  clear-caches:
    runs-on: ubuntu-latest
    permissions:
      actions: write # Required to delete caches
    steps:
      - name: Clear all caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting all caches for ${{ github.repository }}..."
          gh cache delete --all --repo ${{ github.repository }}
          echo "Successfully deleted all caches."
