name: Windows MSVC CMake build (all labs)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  discover:
    name: Discover and check caches
    runs-on: ubuntu-latest
    outputs:
      build_labs: ${{ steps.set.outputs.build_labs }}
      cached_labs: ${{ steps.set.outputs.cached_labs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find labs and check cache status
        id: set
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          
          build_labs="[]"
          cached_labs="[]"
          
          for lab in lab*; do
            [ -d "$lab" ] || continue
            
            # Compute a stable hash of the directory contents
            hash=$(find "$lab" -type f \
              -not -path "*/.git/*" \
              -not -path "*/out/*" \
              -not -path "*/build/*" \
              -not -path "*/docs/html/*" \
              -not -path "*/docs/latex/*" \
              -not -name "compile_commands.json" \
              -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')
              
            cache_key="windows-msvc-cmake-$lab-$hash"
            
            # Check if this exact cache key already exists using the GitHub API
            count=$(gh api -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/actions/caches?key=$cache_key" --jq '.total_count')
            
            item="{\"name\": \"$lab\", \"hash\": \"$hash\", \"cache_key\": \"$cache_key\"}"
            
            if [ "$count" -gt 0 ]; then
              echo "✅ Cache found for $lab - assigning to Linux packaging job."
              cached_labs=$(echo "$cached_labs" | jq -c ". + [$item]")
            else
              echo "❌ No cache for $lab - assigning to Windows build job."
              build_labs=$(echo "$build_labs" | jq -c ". + [$item]")
            fi
          done
          
          echo "build_labs=$build_labs" >> "$GITHUB_OUTPUT"
          echo "cached_labs=$cached_labs" >> "$GITHUB_OUTPUT"
          
          echo "Labs to BUILD (Windows): $build_labs"
          echo "Labs to PACKAGE (Linux): $cached_labs"

  build:
    name: Build ${{ matrix.lab.name }} (MSVC)
    needs: discover
    if: ${{ needs.discover.outputs.build_labs != '[]' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        lab: ${{ fromJson(needs.discover.outputs.build_labs) }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: ${{ matrix.lab.name }}/build
          key: ${{ matrix.lab.cache_key }}
          enableCrossOsArchive: true

      - name: Configure (CMake, Visual Studio 2022)
        run: |
          $lab = "${{ matrix.lab.name }}"
          if (-not (Test-Path (Join-Path $lab "CMakeLists.txt"))) {
            throw "Missing CMakeLists.txt in $lab"
          }
          cmake -S $lab -B "$lab/build" -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: |
          $lab = "${{ matrix.lab.name }}"
          cmake --build "$lab/build" --config Release --parallel

      - name: Package artifacts
        run: |
          $lab = "${{ matrix.lab.name }}"
          $staging = Join-Path $env:RUNNER_TEMP "$lab-artifact"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          Copy-Item "$lab/build" -Destination (Join-Path $staging "build") -Recurse -Force
          Get-ChildItem -Path $lab -File -Include *.exe,*.dll,*.pdb -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $staging -Force }

          $zipPath = Join-Path $env:RUNNER_TEMP "$lab.zip"
          Compress-Archive -Path (Join-Path $staging "*") -DestinationPath $zipPath -Force
          "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Upload artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lab.name }}-windows-msvc
          path: ${{ env.ZIP_PATH }}
          retention-days: 60 

  package_cached:
    name: Package ${{ matrix.lab.name }} (Cached)
    needs: discover
    if: ${{ needs.discover.outputs.cached_labs != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lab: ${{ fromJson(needs.discover.outputs.cached_labs) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore CMake build cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ matrix.lab.name }}/build
          key: ${{ matrix.lab.cache_key }}
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Package artifacts (Linux)
        run: |
          lab="${{ matrix.lab.name }}"
          staging="$RUNNER_TEMP/$lab-artifact"
          mkdir -p "$staging"
          
          # Copy build dir
          if [ -d "$lab/build" ]; then
            cp -r "$lab/build" "$staging/build"
          fi
          
          # Find and copy any top-level exe, dll, or pdb files (if they exist in the repo root)
          # Note: Files generated outside the build directory are NOT cached by the previous step,
          # so only files physically committed to the repo will be found here.
          find "$lab" -maxdepth 1 -type f \( -name "*.exe" -o -name "*.dll" -o -name "*.pdb" \) -exec cp {} "$staging/" \;
          
          zipPath="$RUNNER_TEMP/$lab.zip"
          cd "$staging"
          zip -r "$zipPath" .
          
          echo "ZIP_PATH=$zipPath" >> "$GITHUB_ENV"

      - name: Upload artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lab.name }}-windows-msvc
          path: ${{ env.ZIP_PATH }}
          retention-days: 14

  final-status:
    name: Final status
    runs-on: ubuntu-latest
    needs: [build, package_cached]
    if: always()
    steps:
      - name: Fail if any job failed
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.package_cached.result }}" == "failure" ]; then
            echo "At least one lab failed to compile or package."
            exit 1
          fi
          echo "All builds succeeded or were successfully restored and packaged."
