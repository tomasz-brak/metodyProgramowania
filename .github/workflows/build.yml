name: Windows MSVC CMake build (all labs)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  discover:
    name: Discover lab directories
    runs-on: ubuntu-latest
    outputs:
      labs: ${{ steps.set.outputs.labs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find labs and compute hashes
        id: set
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          
          labs_json="["
          first=true
          
          # Find directories starting with lab
          for lab in lab*; do
            [ -d "$lab" ] || continue
            
            # Compute a stable hash of the directory contents (Linux equivalent to the PS script)
            hash=$(find "$lab" -type f \
              -not -path "*/.git/*" \
              -not -path "*/out/*" \
              -not -path "*/build/*" \
              -not -path "*/docs/html/*" \
              -not -path "*/docs/latex/*" \
              -not -name "compile_commands.json" \
              -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')
              
            cache_key="windows-msvc-cmake-$lab-$hash"
            
            # Check if this exact cache key already exists using the GitHub API
            count=$(gh api -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/actions/caches?key=$cache_key" --jq '.total_count')
            
            if [ "$count" -gt 0 ]; then
              echo "✅ Cache found for $lab ($cache_key) - skipping VM allocation."
            else
              echo "❌ No cache for $lab ($cache_key) - scheduling build."
              item="{\"name\": \"$lab\", \"hash\": \"$hash\"}"
              if [ "$first" = true ]; then
                labs_json="$labs_json$item"
                first=false
              else
                labs_json="$labs_json, $item"
              fi
            fi
          done
          labs_json="$labs_json]"
          
          echo "labs=$labs_json" >> "$GITHUB_OUTPUT"
          echo "Labs to build: $labs_json"

  build:
    name: Build ${{ matrix.lab.name }} (MSVC)
    needs: discover
    if: ${{ needs.discover.outputs.labs != '[]' }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        lab: ${{ fromJson(needs.discover.outputs.labs) }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake build
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.lab.name }}/build
          # Reuse the hash we already calculated in the discover phase
          key: windows-msvc-cmake-${{ matrix.lab.name }}-${{ matrix.lab.hash }}

      - name: Configure (CMake, Visual Studio 2022)
        run: |
          $lab = "${{ matrix.lab.name }}"
          if (-not (Test-Path (Join-Path $lab "CMakeLists.txt"))) {
            throw "Missing CMakeLists.txt in $lab"
          }
          cmake -S $lab -B "$lab/build" -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: |
          $lab = "${{ matrix.lab.name }}"
          cmake --build "$lab/build" --config Release --parallel

      - name: Package artifacts for ${{ matrix.lab.name }}
        if: always()
        run: |
          $lab = "${{ matrix.lab.name }}"
          $staging = Join-Path $env:RUNNER_TEMP "$lab-artifact"
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }
          New-Item -ItemType Directory -Path $staging | Out-Null

          # Include build tree if present
          if (Test-Path "$lab/build") {
            Copy-Item "$lab/build" -Destination (Join-Path $staging "build") -Recurse -Force
          }

          # Include top-level exe/dll/pdb from lab dir if any
          Get-ChildItem -Path $lab -File -Include *.exe,*.dll,*.pdb -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $staging -Force }

          $zipPath = Join-Path $env:RUNNER_TEMP "$lab.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $staging "*") -DestinationPath $zipPath -Force

          "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Upload artifact zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lab.name }}-windows-msvc
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: warn
          retention-days: 14

  final-status:
    name: Final status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Fail if any lab build failed
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "cancelled" ]; then
            echo "At least one lab failed to compile."
            exit 1
          fi
          echo "All builds succeeded or were cached."
